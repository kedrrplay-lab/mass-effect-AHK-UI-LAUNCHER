<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">

<style>
@font-face {
  font-family: "MEFont";
  src: url("./me123.ttf") format("truetype");
}

:root {
  --main-color: #ff3c3c;
  --glow: rgba(255,60,60,0.6);
}

body.theme-me1 { --main-color:#cfcfcf; --glow:rgba(200,200,200,0.6);}
body.theme-me2 { --main-color:#ffcc00; --glow:rgba(255,200,0,0.7);}
body.theme-me3 { --main-color:#00e5ff; --glow:rgba(0,200,255,0.7);}

body {
  margin:0;
  font-family:"MEFont";
  background:black;
  overflow:hidden;
  color:white;
}

.bg {
  position:absolute;
  width:120%;
  height:120%;
  background-size:cover;
  background-position:center;
  filter:brightness(0.6) blur(4px);
  transform:translate(-10%,-10%);
  transition:0.8s;
}

.bg.zoom {
  transform:translate(-10%,-10%) scale(1.2);
  filter:brightness(0.3) blur(8px);
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle, var(--glow), transparent 60%),
    linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
}

.wrapper {
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  opacity:0;
  transform:translateY(40px);
  animation:fadeIn 1.2s ease forwards;
}

@keyframes fadeIn {
  to { opacity:1; transform:translateY(0); }
}

.header {
  margin-top:60px;
}
.header img {
  width:360px;
  filter:brightness(0) invert(1);
}

.games {
  display:flex;
  gap:30px;
}

.card {
  width:200px;
  height:260px;
  border-radius:18px;
  overflow:hidden;
  position:relative;

  border:1px solid var(--main-color);
  cursor:pointer;
  transition:0.35s;

  background:rgba(0,0,0,0.4);
}

.card::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0.9;
  transition:0.4s;
}

.card:hover {
  transform:scale(1.07);
  box-shadow:0 0 25px var(--glow);
}

.card:hover::before {
  transform:scale(1.05);
}

.card.active {
  box-shadow:0 0 40px var(--glow);
}

.card.me1::before { background-image:url("./me1.jpg"); }
.card.me2::before { background-image:url("./me2.jpg"); }
.card.me3::before { background-image:url("./me3.jpg"); }

.card span {
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:18px;
  text-shadow:0 0 10px black;
}

.playBtn {
  margin-top:20px;
  padding:10px 40px;
  border:2px solid var(--main-color);
  border-radius:10px;

  background:rgba(0,0,0,0.5);
  color:var(--main-color);

  cursor:pointer;
  transition:0.3s;
}

.playBtn:hover {
  background:var(--main-color);
  color:black;
  box-shadow:0 0 20px var(--glow);
}

.settings {
  display:flex;
  gap:20px;
  margin-bottom:30px;
}

.btn {
  padding:8px 16px;
  border:1px solid var(--main-color);
  border-radius:8px;

  background:rgba(0,0,0,0.45);
  color:var(--main-color);

  cursor:pointer;
}

.btn:hover {
  background:var(--main-color);
  color:black;
  box-shadow:0 0 12px var(--glow);
}

.playground {
  position:absolute;
  bottom:15px;
  left:15px;

  width:36px;
  height:36px;

  border:1px solid var(--main-color);
  border-radius:8px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:10px;
  color:var(--main-color);

  background:rgba(0,0,0,0.4);
  cursor:pointer;
  transition:0.25s;
}

.playground:hover {
  background:var(--main-color);
  color:black;
  box-shadow:0 0 10px var(--glow);
}

.loading {
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  transition:0.6s;
}
.loading.active { opacity:1; }

</style>

</head>

<body class="theme-me1">

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="wrapper">

  <div class="header">
    <img src="./logo.png">
  </div>

  <div>
    <div class="games">
      <div class="card me1 active" onclick="selectGame(this,'ME1')">
        <span>ME1</span>
      </div>

  <div class="card me2" onclick="selectGame(this,'ME2')">
    <span>ME2</span>
  </div>

  <div class="card me3" onclick="selectGame(this,'ME3')">
    <span>ME3</span>
  </div>
</div>

<div style="text-align:center;">
  <div class="playBtn" onclick="launch()">PLAY</div>
</div>

  </div>

  <div class="settings">
    <div class="btn" id="langBtn" onclick="toggleLang()">RUSSIAN</div>
    <div class="btn" id="voBtn" onclick="toggleVO()">VO OFF</div>
  </div>

</div>

<div class="playground" onclick="openPlayground()">PG</div>

<div class="loading" id="loading"></div>

<script>
let backgrounds = {
  ME1:"./bg1.jpg",
  ME2:"./bg2.jpg",
  ME3:"./bg3.jpg"
};

let langs=["English","French","German","Spanish","Italian","Russian","Polish","Japanese"];

let selectedGame="ME1";
let langIndex=5;
let currentVO=false;

const bg=document.getElementById("bg");

async function init(){
  const s=await window.electronAPI.getSettings();
  langIndex=langs.indexOf(s.lang);
  if(langIndex==-1) langIndex=5;
  currentVO=s.vo;

  setTheme("ME1");
  setBackground("ME1");
  updateUI();
}

function setBackground(g){
  bg.style.backgroundImage=`url(${backgrounds[g]})`;
}

function setTheme(g){
  document.body.className="";
  document.body.classList.add("theme-"+g.toLowerCase());
}

function selectGame(el,g){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  selectedGame=g;
  setTheme(g);
  setBackground(g);
}

function launch(){
  document.getElementById("loading").classList.add("active");
  bg.classList.add("zoom");

  setTimeout(()=>{
    window.electronAPI.launchGame(
      selectedGame,
      langs[langIndex],
      currentVO?1:0
    );
  },1200);
}

function toggleLang(){
  langIndex=(langIndex+1)%langs.length;
  updateUI();
}

function toggleVO(){
  currentVO=!currentVO;
  updateUI();
}

function updateUI(){
  document.getElementById("langBtn").innerText=langs[langIndex];
  document.getElementById("voBtn").innerText=currentVO?"VO ON":"VO OFF";
}

function openPlayground(){
  window.open("https://users.playground.ru/2492109/");
}

window.onload=init;
</script>

</body>
</html>
